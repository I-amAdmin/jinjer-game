function removeWhiteBg(img) {
  try {
    const oc = document.createElement('canvas');
    oc.width = img.naturalWidth; oc.height = img.naturalHeight;
    const ox = oc.getContext('2d');
    ox.drawImage(img, 0, 0);
    const d = ox.getImageData(0, 0, oc.width, oc.height);
    for (let i = 0; i < d.data.length; i += 4) {
      const r=d.data[i], g=d.data[i+1], b=d.data[i+2], a=d.data[i+3];
      if (a === 0) continue;
      // Remove white and near-white background with soft edge feathering
      const brightness = (r + g + b) / 3;
      const saturation = Math.max(r,g,b) - Math.min(r,g,b);
      if (brightness > 220 && saturation < 30) {
        d.data[i+3] = 0;
      } else if (brightness > 195 && saturation < 20) {
        d.data[i+3] = Math.round(((225 - brightness) / 30) * 255);
      }
    }
    ox.putImageData(d, 0, 0);
    return oc;
  } catch(e) {
    return img;
  }
}

_catBody.onload  = () => { catRun = removeWhiteBg(_catBody); runReady = true; };
_catBody.onerror = () => { catRun = null; runReady = false; };
_catFace.onload  = () => { catImg = removeWhiteBg(_catFace); imgReady = true; };

let audioCtx = null, masterGain = null, muted = false, audioStarted = false;
document.getElementById('muteBtn').addEventListener('click', () => {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇 קול' : '🔊 קול';
  if (masterGain) masterGain.gain.value = muted ? 0 : 0.08;
});
function getAC() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = muted ? 0 : 0.08;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function ensureAudio() {
  if (audioStarted) return;
  audioStarted = true;
  getAC();
  scheduleMusic();
}

const MELODY = [
  [523,.5],[659,.5],[784,.5],[659,.5],[523,.5],[392,.5],[440,.5],[494,.5],
  [523,.5],[587,.5],[659,.5],[698,.5],[784,.5],[659,.5],[587,.5],[523,.5],
  [392,.5],[440,.5],[494,.5],[523,.5],[587,.5],[523,.5],[494,.5],[440,.5],
  [392,.5],[440,.5],[523,1],[392,.5],[440,.5],[494,.5],[523,.5],[523,1],
];
const BASS = [[131,1],[165,1],[196,1],[165,1],[131,1],[98,1],[110,1],[123,1]];
const BOSS_MELODY = [
  [784,.25],[784,.25],[1047,.25],[784,.25],[659,.25],[698,.25],[784,.5],
  [659,.25],[659,.25],[880,.25],[659,.25],[523,.25],[587,.25],[659,.5],
  [784,.25],[784,.25],[1047,.25],[784,.25],[659,.25],[698,.25],[784,.5],
  [523,.25],[659,.25],[784,.25],[523,.25],[392,.25],[440,.5],[523,.5],

let musicLoopId = null;
function scheduleMusic(boss = false) {
  const ac = getAC();
  const notes = boss ? BOSS_MELODY : MELODY;
  const BPM = boss ? 200 : 160;
  const beat = 60 / BPM;
  const total = notes.reduce((s,[,d])=>s+d,0) * beat;
  const bassTotal = BASS.reduce((s,[,d])=>s+d,0) * beat;
  const start = ac.currentTime + 0.05;

  let t = start;
  for (const [freq,dur] of notes) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'square'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.4, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur*beat*0.8);
    o.connect(g); g.connect(masterGain);
    o.start(t); o.stop(t + dur*beat); t += dur*beat;
  }
  let tb = start, reps = Math.ceil(total / bassTotal);
  for (let r=0;r<reps;r++) {
    for (const [freq,dur] of BASS) {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'sawtooth'; o.frequency.value = freq;
      g.gain.setValueAtTime(0.2, tb);
      g.gain.exponentialRampToValueAtTime(0.001, tb+dur*beat*0.6);
      o.connect(g); g.connect(masterGain);
      o.start(tb); o.stop(tb+dur*beat); tb+=dur*beat;
    }
  }
  clearTimeout(musicLoopId);
  musicLoopId = setTimeout(() => scheduleMusic(bossActive), (total-0.15)*1000);
}

function sfx(freq1, freq2, dur, type='square', vol=0.18) {
  if (!audioCtx || muted) return;
  const ac = getAC(), o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq1, ac.currentTime);
  if (freq2 !== freq1) o.frequency.exponentialRampToValueAtTime(freq2, ac.currentTime+dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime+dur+0.01);
}

function sfxDogBark() {
  if (!audioCtx||muted) return;
  const ac=getAC(), t=ac.currentTime;

  // נביחה ראשונה "וואף!" — חדה ועוצמתית
  function oneBark(startT, pitch=1) {
    // שכבת בסיס — גל saw גס
    const o1=ac.createOscillator(), g1=ac.createGain();
    o1.type='sawtooth';
    o1.frequency.setValueAtTime(260*pitch, startT);
    o1.frequency.exponentialRampToValueAtTime(130*pitch, startT+0.12);
    g1.gain.setValueAtTime(0, startT);
    g1.gain.linearRampToValueAtTime(0.35, startT+0.012);
    g1.gain.exponentialRampToValueAtTime(0.001, startT+0.18);
    o1.connect(g1); g1.connect(ac.destination);
    o1.start(startT); o1.stop(startT+0.19);

    // שכבה שנייה — הרמוניה נמוכה גרגרנית
    const o2=ac.createOscillator(), g2=ac.createGain();
    o2.type='square';
    o2.frequency.setValueAtTime(130*pitch, startT);
    o2.frequency.exponentialRampToValueAtTime(80*pitch, startT+0.15);
    g2.gain.setValueAtTime(0, startT);
    g2.gain.linearRampToValueAtTime(0.2, startT+0.01);
    g2.gain.exponentialRampToValueAtTime(0.001, startT+0.2);
    o2.connect(g2); g2.connect(ac.destination);
    o2.start(startT); o2.stop(startT+0.21);

    // "קצה" — click חד בהתחלה
    const ob=ac.createOscillator(), gb=ac.createGain();
    ob.type='square'; ob.frequency.value=800*pitch;
    gb.gain.setValueAtTime(0.25, startT);
    gb.gain.exponentialRampToValueAtTime(0.001, startT+0.025);
    ob.connect(gb); gb.connect(ac.destination);
    ob.start(startT); ob.stop(startT+0.03);
  }

  oneBark(t, 1.0);       // נביחה ראשונה
  oneBark(t+0.22, 1.1);  // נביחה שנייה — קצת גבוהה יותר
}

}

function sfxMeow() {
  if (!audioCtx||muted) return;
  const ac=getAC(), t=ac.currentTime;

  // "מיי" — סינוס חם עם ויברטו קל, עולה ואז יורד
  const o1=ac.createOscillator(), g1=ac.createGain();

  o1.frequency.setValueAtTime(750,t);

  o1.frequency.exponentialRampToValueAtTime(580,t+0.22);
  lfo1.frequency.value=8; lg1.gain.value=20;
  lfo1.connect(lg1); lg1.connect(o1.frequency);
  g1.gain.setValueAtTime(0,t);
  g1.gain.linearRampToValueAtTime(0.2,t+0.05);
  g1.gain.exponentialRampToValueAtTime(0.001,t+0.25);
  o1.connect(g1); g1.connect(ac.destination);
  o1.start(t); o1.stop(t+0.26);
  lfo1.start(t); lfo1.stop(t+0.26);

  // הרמוניה שנייה רכה (אוקטבה מתחת)
  const o1h=ac.createOscillator(), g1h=ac.createGain();
  o1h.type='sine'; o1h.frequency.setValueAtTime(375,t); o1h.frequency.exponentialRampToValueAtTime(290,t+0.22);
  g1h.gain.setValueAtTime(0,t); g1h.gain.linearRampToValueAtTime(0.06,t+0.05); g1h.gain.exponentialRampToValueAtTime(0.001,t+0.25);
  o1h.connect(g1h); g1h.connect(ac.destination);
  o1h.start(t); o1h.stop(t+0.26);

  // "אאוו" — ירידה עמוקה ומתארכת עם ויברטו
  const t2=t+0.18;
  const o2=ac.createOscillator(), g2=ac.createGain();
  const lfo2=ac.createOscillator(), lg2=ac.createGain();
  o2.type='sine';
  o2.frequency.setValueAtTime(540,t2);
  o2.frequency.exponentialRampToValueAtTime(320,t2+0.3);
  o2.frequency.exponentialRampToValueAtTime(240,t2+0.65);
  lfo2.frequency.value=10; lg2.gain.value=28;
  lfo2.connect(lg2); lg2.connect(o2.frequency);
  g2.gain.setValueAtTime(0,t2);
  g2.gain.linearRampToValueAtTime(0.22,t2+0.05);
  g2.gain.setValueAtTime(0.22,t2+0.28);
  g2.gain.exponentialRampToValueAtTime(0.001,t2+0.7);
  o2.connect(g2); g2.connect(ac.destination);
  o2.start(t2); o2.stop(t2+0.72);
  lfo2.start(t2); lfo2.stop(t2+0.72);
}
function sfxWoof() {
  if (!audioCtx||muted) return;
  const ac=getAC(), t=ac.currentTime;
  // נביחת אזהרה (רדיפה) — נמוכה ומאיימת יותר
  const o=ac.createOscillator(), g=ac.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(220,t);
  o.frequency.exponentialRampToValueAtTime(100,t+0.2);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.28,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
  o.connect(g); g.connect(ac.destination);
  o.start(t); o.stop(t+0.29);
  // גרגור נמוך
  const o2=ac.createOscillator(), g2=ac.createGain();
  o2.type='square'; o2.frequency.value=90;
  g2.gain.setValueAtTime(0,t); g2.gain.linearRampToValueAtTime(0.12,t+0.02); g2.gain.exponentialRampToValueAtTime(0.001,t+0.3);
  o2.connect(g2); g2.connect(ac.destination);
  o2.start(t); o2.stop(t+0.31);
}

const keys = {}, keysPrev = {};
const dashTap = { left:0, right:0 };
document.addEventListener('keydown', e => {
  if (!keys[e.key]) {
    const now = performance.now();
    if (e.key==='ArrowLeft'||e.key==='a'||e.key==='A') {
      if (now - dashTap.left < 220) { player.dashDir=-1; player.dashTimer=18; sfxDash(); }
      dashTap.left = now;
    }
    if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') {
      if (now - dashTap.right < 220) { player.dashDir=1; player.dashTimer=18; sfxDash(); }
      dashTap.right = now;
    }
    // Menu: any key starts game
    if (gameState === 'menu') {
      ensureAudio();
      startGame();
      return;
    }
    // ESC toggles pause
    if (e.key === 'Escape') {
      if (gameState === 'playing') { gameState = 'paused'; }
      else if (gameState === 'paused') { gameState = 'playing'; }
    }
    ensureAudio();
  }
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keysPrev[e.key]=keys[e.key]; keys[e.key]=false; });
canvas.addEventListener('click', () => {
  if (gameState === 'menu') { ensureAudio(); startGame(); return; }
  ensureAudio();
});

// ══════════════════════════════════════════════════════
//  SCORE
// ══════════════════════════════════════════════════════
function calcScore() {
  return coins*10 + fishGot*50 + levelStars.reduce((a,b)=>a+b,0)*100 + Math.floor(levelTimer/60);
}

function saveScore() {
  const score = calcScore();
  const totalStars = levelStars.reduce((a,b)=>a+b,0);
  const now = new Date();
  const dateStr = now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate();
  let scores = JSON.parse(localStorage.getItem('gingerScores')||'[]');
  scores.push({score, stars:totalStars, date:dateStr});
  scores.sort((a,b)=>b.score-a.score);
  scores = scores.slice(0,5);
  localStorage.setItem('gingerScores', JSON.stringify(scores));
}

function getTopScores() {
  return JSON.parse(localStorage.getItem('gingerScores')||'[]');
}

// ══════════════════════════════════════════════════════
//  ACHIEVEMENTS
// ══════════════════════════════════════════════════════
function unlockAchievement(key, label) {
  if (achievements[key]) return;
  achievements[key] = true;
  localStorage.setItem('gingerAchievements', JSON.stringify(achievements));
  showToast(label);
}

function showToast(text) {
  toasts.push({text, timer:180, y:H-60});
}

function checkAchievements() {
  if (levelTimer/60 > 60) unlockAchievement('speedrun', '⚡ מהיר כברק');
  if (noHurtRun) unlockAchievement('ghost_'+currentLevel, '👻 חתול חמקמק');
  if (coins >= 30) unlockAchievement('rich', '💰 עשיר');
}

function cloneLevel(idx) {
  const src = LEVELS[idx];
  levelPlats = src.platforms.map(p => ({...p, ct:0, cd:0, active:true}));
  levelFish  = src.fish.map((f,i) => ({...f,id:i,collected:false,bob:Math.random()*Math.PI*2}));
  levelItems = src.items.map(it => ({...it,collected:false,bob:Math.random()*Math.PI*2}));
  levelEnemies = src.enemies.map(e => {
    const clone = {...e};
    if (clone.t === 'bigdog') { clone.hp = clone.maxHp || 3; clone.chasing = false; clone.woof = 0; }
    return clone;
  });
  fishGot=0; coinsGot=0;
  levelTimer = src.timeLimit * 60;
  // Reset level-4 specials
  windDir=1; windForce=0; windTimer=300;
  waterY = H + 60;
  rainDrops = Array.from({length:120},()=>({
    x:Math.random()*W, y:Math.random()*H,
    spd:9+Math.random()*5, len:12+Math.random()*8
  }));
}

function resetPlayer() {
  player.x=60; player.y=370;
  player.vx=0; player.vy=0;
  player.onGround=false; player.state='idle';
  player.collectFlash=0; player.hurtFlash=0;
  player.invincible=120; player.dashTimer=0; player.dashCooldown=0;
  player.meowTimer=200+Math.random()*200;
  player.meowActive=0; player.idleTimer=0; player.sweat=false;
  player.heartAnim=0; player.spinAngle=0;
  player.onPlatRef=null; player.onIce=false;
  player.wasInAir=false; player.landTimer=0; player.coyoteTime=0;
}

function initBoss() {
  const isFinal = (currentLevel >= LEVELS.length - 1);
  boss = {
    x: isFinal ? 300 : 340,
    y: isFinal ? 350 : 375,
    w: isFinal ? 110 : 80,
    h: isFinal ? 90  : 60,
    vx: isFinal ? 4.2 : 3.5, vy:0,
    hp: isFinal ? 5 : 3,
    maxHp: isFinal ? 5 : 3,
    onGround:false,
    hitTimer:0, rageMode:false,
    jumpTimer:120, woofTimer:160,
    warnTimer:30,
    isFinal,
  };
}

function startGame() {
  lives=3; coins=0; currentLevel=0;
  levelStars=[0,0,0,0,0,0,0]; noDeathRun=true; noHurtRun=true; startTime=Date.now();
  bossActive=false; boss=null; bossWarning=false;
  particles=[]; floatTexts=[];
  combo=0; comboTimer=0; comboMax=0;
  dashTrail=[];
  cloneLevel(0); resetPlayer();
  // Level entry animation
  player.y = -100;
  levelEntryTimer = 60;
  levelEntryTargetY = 370;
  gameState='levelEntry';
}

function gotoNextLevel() {
  let stars=0;
  if (noDeathRun) stars++;
  if (levelTimer>0) stars++;
  if (coinsGot>=levelItems.filter(i=>i.t==='coin').length) stars++;
  levelStars[currentLevel]=stars;
  checkAchievements();
  noDeathRun=true; noHurtRun=true;

  currentLevel++;
  bossActive=false; boss=null; bossWarning=false;
  cloneLevel(currentLevel); resetPlayer();
  stateTimer=130; gameState='levelComplete';
  sfxLevelUp();

  // Schedule level entry after levelComplete
  // (handled in update when levelComplete ends -> levelEntry)
}

// ══════════════════════════════════════════════════════
//  LOOP
// ══════════════════════════════════════════════════════
let lastTs=0;
function loop(ts) {
  const dt = Math.min((ts-lastTs)/16.67, 3);
  lastTs=ts; animTick+=dt;
  update(dt); render();
  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════════════
//  UPDATE
// ══════════════════════════════════════════════════════
function update(dt) {
  // Update screenshake
  if (shakeDur>0) {
    shakeX=(Math.random()-0.5)*shakeMag*2;
    shakeY=(Math.random()-0.5)*shakeMag*2;
    shakeDur--;
  } else { shakeX=0; shakeY=0; }

  // Update toasts
  for (const t of toasts) { t.timer-=dt; t.y = Math.max(H-80, t.y - 0.5*dt); }
  toasts = toasts.filter(t=>t.timer>0);

  // Menu state
  if (gameState==='menu') {
    updateParticles(dt); return;
  }

  // R restart
  if (gameState==='gameOver'||gameState==='win') {
    if ((keys['r']||keys['R'])&&rKeyUp) { rKeyUp=false; gameState='menu'; return; }
    if (!keys['r']&&!keys['R']) rKeyUp=true;
    updateParticles(dt); updateFloats(dt); return;
  }

  // Paused
  if (gameState==='paused') { return; }

  // Level entry animation
  if (gameState==='levelEntry') {
    levelEntryTimer-=dt;
    player.vy+=GRAVITY*dt;
    player.y+=player.vy*dt;
    if (player.y >= levelEntryTargetY) {
      player.y = levelEntryTargetY;
      player.vy = 0;
      player.onGround = true;
    }
    if (levelEntryTimer<=0) {
      levelEntryTimer=0;
      gameState='playing';
      player.invincible=120;
    }
    updateParticles(dt); return;
  }

  if (gameState==='fell') {
    stateTimer-=dt;
    player.spinAngle+=0.14*dt;
    player.spinY=Math.min(canvas.height+100, player.spinY+5*dt);
    updateParticles(dt);
    if (stateTimer<=0) {
      if (lives<=0) { saveScore(); gameState='gameOver'; sfxGameOver(); }
      else { gameState='playing'; resetPlayer(); }
    }
    return;
  }
  if (gameState==='levelComplete') {
    stateTimer-=dt;
    if (stateTimer<=0) {
      // Start level entry for new level
      player.y = -100;
      player.vy = 0;
      levelEntryTimer = 60;
      levelEntryTargetY = 370;
      gameState='levelEntry';
    }
    return;
  }
  if (gameState==='bossWarning') {
    bossWarnTimer-=dt;
    if (bossWarnTimer<=0) { gameState='playing'; bossActive=true; initBoss(); scheduleMusic(true); }
    return;
  }
  if (gameState==='eating') {
    eatingTimer-=dt;
    if (eatingTimer<=0) {
      if (eatingNext==='boss')      { gameState='bossWarning'; bossWarnTimer=110; sfxWoof(); triggerShake(15,20); }
      else if (eatingNext==='win')  { saveScore(); checkAchievements(); gameState='win'; sfxWin(); spawnP(400,250,'#FFD700',80,8); }
      else                          { gotoNextLevel(); }
      eatingTimer=0;
    }
    updateParticles(dt); updateFloats(dt); return;
  }

  // ── Timer ──
  levelTimer-=dt;
  if (levelTimer<0) levelTimer=0;

  // ── Combo timer ──
  if (comboTimer>0) { comboTimer-=dt; }
  else { combo=0; }

  // ── Platforms (moving/crumble) ──
  for (const p of levelPlats) {
    if (!p.active) continue;
    if (p.t==='moving') {
      p.x += p.mx*dt;
      const d = p.x - p.ox;
      if (Math.abs(d)>=p.range) { p.mx*=-1; p.x=p.ox+p.range*Math.sign(d); }
    }
    if (p.t==='vmove') {
      p.y += p.my*dt;
      const dy = p.y - p.oy;
      if (Math.abs(dy)>=p.rangey) { p.my*=-1; p.y=p.oy+p.rangey*Math.sign(dy); }
    }
    if (p.t==='crumble') {
      if (p.ct>0) {
        p.ct-=dt;
        if (p.ct<=0) { p.cd=90; p.active=false; }
      }
      if (p.cd>0) p.cd-=dt;
    }
  }

  // ── Level 4 specials: Wind + Rain + Water ──
  if (currentLevel===3) {
    // Wind direction changes every ~5-8 seconds
    windTimer -= dt;
    if (windTimer <= 0) {
      windDir *= -1;
      windTimer = 280+Math.random()*200;
      addFloat(W/2, H/2-80, windDir>0 ? '💨 רוח ממזרח!' : '💨 רוח ממערב!', '#88ccff');
    }
    windForce = windDir * 0.7;
    player.vx += windForce * dt;

    // Rain drops update
    for (const r of rainDrops) {
      r.y += r.spd * dt;
      r.x += windDir * 2 * dt;
      if (r.y > H+10) { r.y=-10; r.x=Math.random()*W; }
      if (r.x<0) r.x=W; if (r.x>W) r.x=0;
    }

    // Water rises over time (from bottom, covers ~bottom 60px by end)
    const timeLeft = levelTimer / (LEVELS[3].timeLimit*60);
    waterY = H + 60 - (1 - timeLeft) * 130;
    if (waterY < H - 60) waterY = H - 60; // max rise

    // Player touches water?
    if (player.y + PH > waterY) {
      hurtPlayer();
      player.vy = JUMP_VEL * 0.7; // bounce up from water
      spawnP(player.x+PW/2, waterY, '#4488FF', 15, 5);
    }
  }

  // ── Player input ──
  const left  = keys['ArrowLeft'] ||keys['a']||keys['A'];
  const right = keys['ArrowRight']||keys['d']||keys['D'];
  const jump  = keys['ArrowUp']   ||keys['w']||keys['W']||keys[' '];
  const spd   = player.coffeeTimer>0 ? SPEED*1.75 : SPEED;

  if (player.dashTimer>0) {
    player.vx = player.dashDir * spd * 2.5;
    player.dashTimer-=dt;
    // Dash trail
    dashTrail.push({x:player.x, y:player.y, alpha:0.6});
  } else {
    if (left)       { player.vx=-spd; player.facing=-1; }
    else if (right) { player.vx= spd; player.facing= 1; }
    else {
      const fric = player.onIce ? 0.97 : 0.75;
      player.vx *= fric;
    }
  }
  if (player.dashCooldown>0) player.dashCooldown-=dt;

  // Coyote time
  const wasOnGround = player.wasInAir === false && player.onGround;
  // Track wasInAir before physics
  const prevOnGround = player.onGround;

  // Jump with coyote time support
  if (jump && (player.onGround || player.coyoteTime>0)) {
    player.vy=JUMP_VEL; player.onGround=false; player.coyoteTime=0;
    sfxJump(); spawnP(player.x+PW/2, player.y+PH, '#ffffffaa',5,2);
  }

  // ── Physics ──
  player.vy+=GRAVITY*dt;
  player.x+=player.vx*dt;
  player.y+=player.vy*dt;

  // Track landing
  const prevVy = player.vy;

  // ── Platform collisions ──
  const wasGrounded = player.onGround;
  player.onGround=false; player.onIce=false;
  const prevPlatRef=player.onPlatRef; player.onPlatRef=null;
  for (const p of levelPlats) {
    if (!p.active) continue;
    if (player.x+PW>p.x+4&&player.x<p.x+p.w-4) {
      if (player.vy>=0&&player.y+PH>p.y&&player.y+PH<p.y+p.h+player.vy*dt+3) {
        player.y=p.y-PH; player.onGround=true; player.onPlatRef=p;
        if (p.t==='bouncy') {
          player.vy=JUMP_VEL*1.85; player.onGround=false;
          sfxBounce(); spawnP(p.x+p.w/2,p.y,'#00FF88',8,4);
        } else { player.vy=0; }
        if (p.t==='ice') player.onIce=true;
        if (p.t==='crumble'&&p.ct===0&&p.active) p.ct=55;
        if (p.t==='moving'&&prevPlatRef===p) player.x+=p.mx*dt;
        if (p.t==='vmove'&&prevPlatRef===p) player.y+=p.my*dt;
      }
    }
  }

  // ── Coyote time logic ──
  if (prevOnGround && !player.onGround && player.vy >= 0) {
    player.coyoteTime = 8;
  }
  if (player.coyoteTime > 0) player.coyoteTime -= dt;

  // ── Landing squish ──
  if (!wasGrounded && player.onGround && prevVy > 4) {
    player.landTimer = 12;
    spawnP(player.x+8, player.y+PH, '#ccccccaa', 4, 2);
    spawnP(player.x+PW-8, player.y+PH, '#ccccccaa', 4, 2);
    triggerShake(5,8);
  }
  if (player.landTimer > 0) player.landTimer -= dt;
  player.wasInAir = !player.onGround;

  // Wall bounds
  if (player.x<0){player.x=0;player.vx=0;}
  if (player.x+PW>W){player.x=W-PW;player.vx=0;}

  // State
  if (!player.onGround) player.state='jump';
  else if (Math.abs(player.vx)>0.5) player.state='run';
  else player.state='idle';

  // Timers
  if (player.collectFlash>0) player.collectFlash-=dt;
  if (player.hurtFlash>0)    player.hurtFlash-=dt;
  if (player.invincible>0)   player.invincible-=dt;
  if (player.coffeeTimer>0)  player.coffeeTimer-=dt;
  if (player.heartAnim>0)    player.heartAnim-=dt;
  player.tailAngle+=0.07*player.tailDir*dt;
  if (Math.abs(player.tailAngle)>0.45) player.tailDir*=-1;

  // Idle timer & meow
  if (player.state==='idle') player.idleTimer+=dt; else player.idleTimer=0;
  player.meowTimer-=dt;
  if (player.meowTimer<=0||player.idleTimer>300) {
    player.idleTimer=0;
    player.meowTimer=350+Math.random()*300;
    player.meowActive=70;
    sfxMeow();
  }
  if (player.meowActive>0) player.meowActive-=dt;

  // Dash trail decay
  for (const t of dashTrail) t.alpha -= 0.08;
  dashTrail = dashTrail.filter(t=>t.alpha>0);

  // Fall off
  if (player.y>H+70) {
    lives--; noDeathRun=false; noHurtRun=false;
    sfxFall();
    triggerShake(5,8);
    spawnP(player.x+PW/2, H-10,'#ff4444',28,5);
    player.spinY=H-30;
    stateTimer=110; gameState='fell';
    return;
  }

  // ── Fish collection ──
  for (const fish of levelFish) {
    if (fish.collected) continue;
    fish.bob+=0.06*dt;
    const fy=fish.y+Math.sin(fish.bob)*6;
    if (player.x<fish.x+30&&player.x+PW>fish.x&&player.y<fy+28&&player.y+PH>fy) {
      fish.collected=true; fishGot++;
      player.collectFlash=8; player.heartAnim=30;
      sfxCollect();
      spawnP(fish.x+15,fy+14,'#FF8C00',12,4);

      // Combo
      combo++;
      comboTimer=80;
      if (combo > comboMax) comboMax=combo;
      if (combo > 1) {
        fishGot += (combo-1);
        addFloat(fish.x+15, fy-20, `+${combo}x קומבו!`, '#FFD700');
      } else {
        addFloat(fish.x+15, fy-8, '🐟+1', '#FF8C00');
      }

      // Accurate achievement: 3 fish in row under 2s each
      const now2 = performance.now();
      if (now2 - lastFishTime < 2000) {
        fishInRowCount++;
        if (fishInRowCount >= 3) unlockAchievement('accurate','🎯 מדויק');
      } else {
        fishInRowCount=1;
      }
      lastFishTime = now2;
    }
  }

  // ── Items collection ──
  for (const it of levelItems) {
    if (it.collected) continue;
    it.bob=(it.bob||0)+0.05*dt;
    const iy=it.y+Math.sin(it.bob)*4;
    if (player.x<it.x+20&&player.x+PW>it.x&&player.y<iy+20&&player.y+PH>iy) {
      it.collected=true;
      if (it.t==='coin') { coins++; coinsGot++; sfxCoin(); spawnP(it.x+10,iy,'#FFD700',6,3); addFloat(it.x+10,iy-8,'+1🪙','#FFD700'); }
      if (it.t==='milk') { if(lives<3)lives++; sfxCollect(); spawnP(it.x+10,iy,'#fff',10,3); addFloat(it.x+10,iy-8,'❤️','#FF4466'); }
      if (it.t==='coffee') { player.coffeeTimer=480; sfxCoffee(); spawnP(it.x+10,iy,'#8B4513',10,3); addFloat(it.x+10,iy-8,'☕ מהיר!','#8B4513'); }
      if (it.t==='goldfish') { fishGot+=3; sfxCollect(); spawnP(it.x+10,iy,'#FFD700',15,5); addFloat(it.x+10,iy-8,'🐠 x3!','#FFD700'); }
      // Rich achievement
      if (coins>=30) unlockAchievement('rich','💰 עשיר');
    }
  }

  // ── Enemies ──
  updateEnemies(dt);

  // ── Boss ──
  if (bossActive&&boss) updateBoss(dt);

  // ── Level complete → כל הדגים חייבים להיאסף ממש ──
  if (levelFish.length > 0 && levelFish.every(f => f.collected) && !bossActive && gameState==='playing') {
    const lvl=LEVELS[currentLevel];
    eatingNext = lvl.hasBoss ? 'boss' : (currentLevel>=LEVELS.length-1 ? 'win' : 'next');
    eatingTimer=220;
    gameState='eating';
    sfxEat();
    spawnP(player.x+PW/2, player.y, '#FF8C00', 20, 5);
  }

  updateParticles(dt); updateFloats(dt);
}

function updateEnemies(dt) {
  for (const e of levelEnemies) {
    if (e.dead) continue;

    if (e.t==='dog') {
      if (e.st>0) { e.st-=dt; continue; }

      const dx=player.x+PW/2-(e.x+20);
      const chase=(Math.abs(dx)<180&&Math.abs(player.y-e.wy)<80&&player.invincible<=0);
      e.sweat=Math.abs(dx)<250&&!chase;
      if (chase) {
        player.sweat=true;
        e.dir=dx>0?1:-1;
        e.x+=e.dir*(e.spd+0.8)*dt;
        if (e.woof>0) e.woof-=dt;
        else { sfxWoof(); addFloat(e.x+20,e.wy-40,'וואוף!','#CC4400'); e.woof=200; }
      } else {
        player.sweat=false;
        e.x+=e.dir*e.spd*dt;
        if (e.x<e.pl) { e.x=e.pl; e.dir=1; }
        if (e.x>e.pr) { e.x=e.pr; e.dir=-1; }
        e.woof=(e.woof||0)-dt;
      }

      if (player.invincible<=0&&
          player.x<e.x+40&&player.x+PW>e.x&&
          player.y+PH>e.wy&&player.y<e.wy+40) {
        if (player.vy>0&&player.y+PH<e.wy+20) {
          e.st=90; player.vy=JUMP_VEL*0.8;
          spawnP(e.x+20,e.wy,'#FF8800',10,4);
          addFloat(e.x+20,e.wy-30,'😵','#fff');
        } else {
          sfxDogBark();
          hurtPlayer();
        }
      }
    }

    if (e.t==='bird') {
      e.phase+=0.04*dt;
      e.x=e.bx+Math.cos(e.phase*0.7)*120;
      const baseY=LEVELS[currentLevel].enemies.find(en=>en===e)?.y||100;
      e.ry=(e.ry||baseY)+(Math.sin(e.phase)*e.amp - (e.ry||baseY)) * 0.08;

      if (player.invincible<=0&&
          player.x<e.x+28&&player.x+PW>e.x&&
          player.y<e.ry+22&&player.y+PH>e.ry) {
        hurtPlayer();
      }
    }

    // 🐕 BIG DOG — כלב גדול, דורש 3 קפיצות, רדיפה מרחוק
    if (e.t==='bigdog') {
      if (e.st > 0) { e.st -= dt; continue; }

      const dx = player.x + PW/2 - (e.x + 44);
      const dy = Math.abs(player.y - e.wy);
      const chaseRange = e.chasing ? 380 : 260;
      e.chasing = Math.abs(dx) < chaseRange && dy < 120 && player.invincible <= 0;

      if (e.chasing) {
        player.sweat = true;
        e.dir = dx > 0 ? 1 : -1;
        const spd = e.spd + (e.hp < e.maxHp * 0.5 ? 1.2 : 0.5); // rage boost at low HP
        e.x += e.dir * spd * dt;
        if (e.woof > 0) e.woof -= dt;
        else {
          sfxDogBark();
          addFloat(e.x + 44, e.wy - 55, '🐕 GRRR!', '#CC0000');
          e.woof = 140;
        }
      } else {
        e.x += e.dir * e.spd * 0.7 * dt;
        if (e.x < e.pl) { e.x = e.pl; e.dir = 1; }
        if (e.x > e.pr) { e.x = e.pr; e.dir = -1; }
        e.woof = (e.woof || 0) - dt;
      }

      // Collision box: wider and taller than normal dog
      if (player.invincible <= 0 &&
          player.x < e.x + 88 && player.x + PW > e.x &&
          player.y + PH > e.wy && player.y < e.wy + 56) {
        if (player.vy > 1 && player.y + PH < e.wy + 22) {
          // Can be stunned — needs 3 hits (hp tracked)
          e.hp--;
          e.st = 50;
          player.vy = JUMP_VEL * 0.85;
          player.invincible = 45;
          spawnP(e.x + 44, e.wy, '#FF4400', 18, 6);
          triggerShake(5, 8);
          if (e.hp <= 0) {
            e.dead = true;
            sfxBossDie();
            spawnP(e.x + 44, e.wy + 20, '#FFD700', 40, 8);
            addFloat(e.x + 44, e.wy - 40, '🏆 כלב מנוצח!', '#FFD700');
            coins += 5;
          } else {
            sfxBossHit();
            addFloat(e.x + 44, e.wy - 40, `💥 ${e.hp} HP נשאר`, '#FF8800');
          }
        } else {
          sfxDogBark();
          hurtPlayer();
        }
      }
    }

    // 👻 GHOST CAT — חדש! מרחף בגלים, עובר דרך פלטפורמות
    if (e.t==='ghost') {
      e.phase += 0.025 * dt;
      e.x = (e.x || 400) + Math.sin(e.phase * 0.6) * e.spd * dt * 4;
      e.ry = e.baseY + Math.sin(e.phase) * e.amp;
      // אם יוצא מהמסך — חוזר מהצד השני
      if (e.x < -50) e.x = W + 50;
      if (e.x > W + 50) e.x = -50;

      // מחיר: לא ניתן לדרוך עליו — תמיד פוגע
      if (player.invincible<=0&&
          player.x < e.x+40 && player.x+PW > e.x &&
          player.y < e.ry+40 && player.y+PH > e.ry) {
        hurtPlayer();
        sfxMeow(); // ג'ינגר מיאו מפחד
      }
    }
  }
}

function updateBoss(dt) {
  if (!boss) return;
  boss.vy+=GRAVITY*dt;
  boss.x+=boss.vx*dt;
  boss.y+=boss.vy*dt;

  const ground=LEVELS[currentLevel].platforms.find(p=>p.t==='normal'&&p.y>=430);
  const groundY=ground?ground.y:450;
  if (boss.y+boss.h>=groundY) { boss.y=groundY-boss.h; boss.vy=0; boss.onGround=true; }
  else boss.onGround=false;

  if (boss.x<0){boss.x=0;boss.vx=Math.abs(boss.vx);}
  if (boss.x+boss.w>W){boss.x=W-boss.w;boss.vx=-Math.abs(boss.vx);}

  boss.jumpTimer-=dt;
  if (boss.jumpTimer<=0&&boss.onGround) {
    boss.vy=JUMP_VEL*(boss.rageMode?1.2:0.9);
    boss.jumpTimer=180+Math.random()*120;
  }

  boss.woofTimer-=dt;
  if (boss.woofTimer<=0) { sfxWoof(); addFloat(boss.x+boss.w/2,boss.y-20,'וואוף!!','#FF2200'); boss.woofTimer=200+Math.random()*100; }

  if (boss.hitTimer>0) boss.hitTimer-=dt;
  boss.rageMode=boss.hp<=1;
  if (boss.rageMode) boss.vx=boss.vx>0?4.8:-4.8;

  if (player.invincible<=0&&
      player.x<boss.x+boss.w-8&&player.x+PW>boss.x+8&&
      player.y+PH>boss.y&&player.y<boss.y+boss.h) {
    if (player.vy>1&&player.y+PH<boss.y+30) {
      boss.hp--;
      boss.hitTimer=30;
      player.vy=JUMP_VEL*0.75;
      player.invincible=60;
      sfxBossHit();
      triggerShake(8,12);
      spawnP(boss.x+boss.w/2,boss.y,'#FF4400',20,6);
      addFloat(boss.x+boss.w/2,boss.y-30,`💥 ${boss.hp} HP נשאר`,'#FF4400');
      if (boss.hp<=0) {
        sfxBossDie(); bossActive=false;
        spawnP(boss.x+boss.w/2,boss.y+boss.h/2,'#FFD700',60,8);
        setTimeout(()=>{
          if (currentLevel>=LEVELS.length-1){ saveScore(); checkAchievements(); gameState='win';sfxWin();}
          else gotoNextLevel();
        },1200);
      }
      boss.vx*=-1.2;
    } else {
      hurtPlayer();
    }
  }
}

function hurtPlayer() {
  if (player.invincible>0) return;
  lives--; noDeathRun=false; noHurtRun=false;
  player.invincible=140; player.hurtFlash=30;
  sfxHurt(); spawnP(player.x+PW/2,player.y+PH/2,'#FF4444',12,4);
  addFloat(player.x+PW/2,player.y-10,'אוי!','#FF4444');
  triggerShake(8,12);
  if (lives<=0) { saveScore(); gameState='gameOver'; sfxGameOver(); }
}

function updateParticles(dt) {
  for (const p of particles) { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=0.15*dt; p.life-=dt; }
  particles=particles.filter(p=>p.life>0);
}
function updateFloats(dt) {
  for (const t of floatTexts) { t.y-=0.8*dt; t.timer-=dt; }
  floatTexts=floatTexts.filter(t=>t.timer>0);
}
function spawnP(x,y,color,count,speed) {
  for (let i=0;i<count;i++) {
    const a=Math.random()*Math.PI*2, s=speed*(0.5+Math.random());
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-speed*0.4,life:25+Math.random()*20,maxLife:45,color,size:3+Math.random()*3});
  }
}
function addFloat(x,y,text,color) { floatTexts.push({x,y,text,color,timer:55}); }

// ══════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════
function render() {
  ctx.clearRect(0,0,W,H);

  // Apply screenshake
  ctx.save();
  ctx.translate(shakeX, shakeY);

  if (gameState === 'menu') {
    drawMenu();
    ctx.restore();
    drawVignette();
    drawToasts();
    return;
  }

  drawBG();
  if (currentLevel===3) drawRain();
  drawPlatforms();
  drawItems();
  drawFish();
  drawEnemies();
  if (currentLevel===3) drawWater();
  if (bossActive&&boss) drawBoss();
  drawParticlesAll();

  // Draw dash trail before player
  drawDashTrail();

  drawFloats();

  if (gameState==='fell') drawFellAnim();
  else drawPlayer();

  drawHUD();

  if (gameState==='levelEntry')       drawLevelEntry();
  if (gameState==='fell')             drawFellOverlay();
  if (gameState==='eating')           drawEatingScreen();
  if (gameState==='levelComplete')    drawLevelComplete();
  if (gameState==='bossWarning')      drawBossWarning();
  if (gameState==='paused')           drawPauseScreen();
  if (gameState==='gameOver')         drawGameOver();
  if (gameState==='win')              drawWin();

  ctx.restore(); // end screenshake

  drawVignette();
  drawToasts();
}

function drawVignette() {
  const vg = ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

// ── Toast notifications ──
function drawToasts() {
  for (const t of toasts) {
    const alpha = Math.min(1, t.timer/30);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle='rgba(0,0,0,0.75)';
    ctx.beginPath();
    ctx.roundRect(W/2-160, t.y, 320, 36, 8);
    ctx.fill();
    ctx.strokeStyle='#FFD700'; ctx.lineWidth=2;
    ctx.stroke();
    ctx.fillStyle='#FFD700'; ctx.font='bold 16px Arial'; ctx.textAlign='center';
    ctx.fillText('🏆 הישג חדש: '+t.text, W/2, t.y+24);
    ctx.textAlign='left';
    ctx.restore();
  }
}

// ── Rain (Level 4) ──
function drawRain() {
  ctx.save();
  ctx.strokeStyle='rgba(160,210,255,0.45)';
  ctx.lineWidth=1.2;
  for (const r of rainDrops) {
    ctx.beginPath();
    ctx.moveTo(r.x, r.y);
    ctx.lineTo(r.x - windDir*3, r.y - r.len);
    ctx.stroke();
  }
  ctx.restore();
}

// ── Rising Water (Level 4) ──
function drawWater() {
  ctx.save();
  // Animated wavy surface
  const wd = ctx.createLinearGradient(0, waterY, 0, H);
  wd.addColorStop(0,'rgba(40,120,220,0.75)');
  wd.addColorStop(1,'rgba(10,40,120,0.9)');
  ctx.fillStyle = wd;
  ctx.beginPath();
  ctx.moveTo(0, waterY);
  for (let x=0; x<=W; x+=24) {
    ctx.lineTo(x, waterY + Math.sin(animTick*0.08 + x*0.04)*5);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H);
  ctx.closePath(); ctx.fill();
  // Surface shimmer
  ctx.strokeStyle='rgba(150,210,255,0.6)'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(0, waterY);
  for (let x=0; x<=W; x+=24) {
    ctx.lineTo(x, waterY + Math.sin(animTick*0.08 + x*0.04)*5);
  }
  ctx.stroke();
  ctx.restore();
}

// ── Ghost Cat (Level 4) ──
function drawGhost(e) {
  const x=e.x, y=e.ry||e.baseY;
  const pulse = Math.sin(animTick*0.1)*0.25+0.6;
  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.shadowColor='#88AAFF'; ctx.shadowBlur=20;
  // Body
  ctx.fillStyle='rgba(180,200,255,0.7)';
  ctx.beginPath(); ctx.ellipse(x+22,y+18,22,18,0,0,Math.PI*2); ctx.fill();
  // Head
  ctx.beginPath(); ctx.ellipse(x+22,y+6,16,14,0,0,Math.PI*2); ctx.fill();
  // Ears
  ctx.beginPath(); ctx.moveTo(x+8,y); ctx.lineTo(x+12,y-12); ctx.lineTo(x+18,y); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+26,y); ctx.lineTo(x+32,y-12); ctx.lineTo(x+36,y); ctx.fill();
  // Glowing eyes
  ctx.shadowColor='#FF8888'; ctx.shadowBlur=10;
  ctx.fillStyle='rgba(255,100,100,0.9)';
  ctx.beginPath(); ctx.ellipse(x+16,y+4,4,3,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+28,y+4,4,3,0,0,Math.PI*2); ctx.fill();
  // Warning text
  if (Math.floor(animTick*0.05)%3===0) {
    ctx.shadowBlur=0; ctx.fillStyle='rgba(255,150,150,0.9)';
    ctx.font='bold 11px Arial'; ctx.textAlign='center';
    ctx.fillText('👻',x+22,y-14);
  }
  ctx.restore();
}

// ── Menu Screen ──
function drawMenu() {
  ctx.save();

  // === Rich background ===
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0e0820');
  bg.addColorStop(0.5, '#1a1030');
  bg.addColorStop(1, '#0a0515');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Warm orange glow bottom-left (like a cozy room)
  const glow1 = ctx.createRadialGradient(160, H, 0, 160, H, 340);
  glow1.addColorStop(0, 'rgba(255,120,30,0.18)');
  glow1.addColorStop(1, 'transparent');
  ctx.fillStyle = glow1; ctx.fillRect(0, 0, W, H);

  // Cool blue glow top-right
  const glow2 = ctx.createRadialGradient(W-100, 80, 0, W-100, 80, 280);
  glow2.addColorStop(0, 'rgba(80,120,255,0.10)');
  glow2.addColorStop(1, 'transparent');
  ctx.fillStyle = glow2; ctx.fillRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < 100; i++) {
    const sx = (i*137+23)%790+5, sy = (i*97+11)%490+5;
    const br = (Math.sin(animTick*0.03+i*0.7)+1)*0.5;
    const sz = i%7===0 ? 2.5 : i%3===0 ? 1.5 : 1;
    ctx.globalAlpha = 0.25+br*0.75;
    ctx.fillStyle = i%8===0 ? '#FFE8A0' : '#ffffff';
    ctx.beginPath(); ctx.arc(sx, sy, sz*(0.6+br*0.4)/2, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // === Decorative floor line ===
  const floorY = 440;
  const floorGrad = ctx.createLinearGradient(0, floorY, W, floorY);
  floorGrad.addColorStop(0, 'transparent');
  floorGrad.addColorStop(0.2, 'rgba(255,140,50,0.35)');
  floorGrad.addColorStop(0.8, 'rgba(255,140,50,0.35)');
  floorGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = floorGrad; ctx.fillRect(0, floorY, W, 2);

  // Paw prints decorative
  const pawPositions = [[90,430],[180,420],[670,425],[740,435]];
  ctx.fillStyle = 'rgba(255,140,60,0.18)';
  for (const [px,py] of pawPositions) {
    ctx.beginPath(); ctx.arc(px, py, 10, 0, Math.PI*2); ctx.fill();
    for (let toe=0; toe<3; toe++) {
      ctx.beginPath();
      ctx.arc(px-10+toe*10, py-13, 5, 0, Math.PI*2); ctx.fill();
    }
  }

  ctx.textAlign = 'center';

  // === TITLE ===
  ctx.save();
  const pulse = Math.sin(animTick*0.045)*0.06+0.97;
  ctx.scale(pulse, pulse);

  // Title shadow
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.font = "bold 52px 'Fredoka One', Arial";
  ctx.fillText("הרפתקאות ג'ינגר", W/2/pulse+3, 78/pulse+3);

  // Title gradient
  const titleGrad = ctx.createLinearGradient(W/2/pulse-220, 0, W/2/pulse+220, 0);
  titleGrad.addColorStop(0, '#FF4500');
  titleGrad.addColorStop(0.35, '#FF8C00');
  titleGrad.addColorStop(0.65, '#FFD700');
  titleGrad.addColorStop(1, '#FF6600');
  ctx.fillStyle = titleGrad;
  ctx.shadowColor = 'rgba(255,140,0,0.8)'; ctx.shadowBlur = 24;
  ctx.fillText("הרפתקאות ג'ינגר", W/2/pulse, 78/pulse);
  ctx.shadowBlur = 0;

  // Paw emoji left/right of title
  ctx.font = '28px Arial';
  ctx.globalAlpha = 0.85+Math.sin(animTick*0.06)*0.15;
  ctx.fillText('🐾', W/2/pulse-205, 75/pulse);
  ctx.fillText('🐾', W/2/pulse+205, 75/pulse);
  ctx.globalAlpha = 1;
  ctx.restore();

  // Subtitle
  ctx.fillStyle = 'rgba(200,170,120,0.75)';
  ctx.font = "16px 'Heebo', Arial";
  ctx.fillText('משחק פלטפורמה עם החתול הג׳ינג׳י האמיתי!', W/2, 104);

  // === CAT IMAGE — large, prominent ===
  const catSprite = (runReady && catRun) ? catRun : (imgReady && catImg) ? catImg : null;
  const portrait  = (imgReady && catImg) ? catImg : null;

  const catW = 240, catH = 260;
  const catX = W/2 - catW/2;
  const bob = Math.sin(animTick*0.055)*7;
  const catY = 118 + bob;

  // Glow behind cat
  const catGlow = ctx.createRadialGradient(W/2, catY+catH*0.55, 10, W/2, catY+catH*0.55, 145);
  catGlow.addColorStop(0, 'rgba(255,160,60,0.22)');
  catGlow.addColorStop(0.6, 'rgba(255,100,20,0.10)');
  catGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = catGlow; ctx.fillRect(0, 0, W, H);

  // Shadow on floor
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(W/2, catY+catH-10, catW*0.36, 14, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;

  if (catSprite) {
    ctx.save();
    ctx.shadowColor = 'rgba(255,180,80,0.35)'; ctx.shadowBlur = 18;
    ctx.drawImage(catSprite, catX, catY, catW, catH);
    ctx.shadowBlur = 0;
    ctx.restore();
  } else {
    ctx.font = '100px Arial'; ctx.fillText('🐱', W/2, catY+catH*0.6);
  }

  // Small portrait in corner if both images available
  if (portrait && catSprite !== portrait) {
    ctx.save();
    ctx.shadowColor = 'rgba(255,140,0,0.5)'; ctx.shadowBlur = 10;
    ctx.globalAlpha = 0.88;
    ctx.beginPath(); ctx.arc(66, 66, 44, 0, Math.PI*2); ctx.clip();
    ctx.drawImage(portrait, 22, 22, 88, 88);
    ctx.restore();
    ctx.strokeStyle = 'rgba(255,160,50,0.7)'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(66, 66, 44, 0, Math.PI*2); ctx.stroke();
  }

  // === SCORES BOX ===
  const scores = getTopScores();
  const bx = W/2-170, by = 390, bw = 340, bh = 95;
  ctx.save();
  ctx.shadowColor='rgba(255,140,0,0.3)'; ctx.shadowBlur=16;
  const panelGrad = ctx.createLinearGradient(bx, by, bx, by+bh);
  panelGrad.addColorStop(0, 'rgba(20,12,35,0.85)');
  panelGrad.addColorStop(1, 'rgba(10,5,20,0.90)');
  ctx.fillStyle = panelGrad;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 14); ctx.fill();
  ctx.strokeStyle = 'rgba(255,160,50,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#FFD700'; ctx.font = "bold 15px 'Fredoka One',Arial";
  ctx.fillText('🏆 שיאים', W/2, by+20);
  if (scores.length === 0) {
    ctx.fillStyle = 'rgba(180,160,130,0.7)'; ctx.font = "13px 'Heebo',Arial";
    ctx.fillText('אין עדיין שיאים — היה הראשון!', W/2, by+52);
  } else {
    const medals = ['🥇','🥈','🥉'];
    scores.slice(0,3).forEach((s,i) => {
      ctx.fillStyle = ['#FFD700','#C0C0C0','#CD7F32'][i];
      ctx.font = "13px 'Heebo',Arial";
      ctx.fillText(`${medals[i]} ${s.score} נק' | ⭐${s.stars} | ${s.date}`, W/2, by+38+i*22);
    });
  }
  ctx.restore();

  // === START TEXT ===
  if (Math.floor(animTick*0.038)%2===0) {
    ctx.save();
    const startGrad = ctx.createLinearGradient(W/2-130, 0, W/2+130, 0);
    startGrad.addColorStop(0,'rgba(255,200,80,0.9)');
    startGrad.addColorStop(0.5,'#ffffff');
    startGrad.addColorStop(1,'rgba(255,200,80,0.9)');
    ctx.fillStyle = startGrad;
    ctx.shadowColor = 'rgba(255,220,100,0.5)'; ctx.shadowBlur = 14;
    ctx.font = "bold 21px 'Fredoka One',Arial";
    ctx.fillText('✨ לחץ כל מקש להתחיל ✨', W/2, 382);
    ctx.restore();
  }

  ctx.textAlign = 'left';
  ctx.restore();
}

// ── Level Entry Animation ──
function drawLevelEntry() {
  const prog = 1 - levelEntryTimer/60;
  const alpha = Math.min(1, prog*3);
  ctx.save(); ctx.globalAlpha=alpha*0.9;
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=alpha;
  ctx.textAlign='center';
  ctx.fillStyle='#FFD700'; ctx.font='bold 42px Arial';
  ctx.shadowColor='#FF8C00'; ctx.shadowBlur=20;
  ctx.fillText(`שלב ${currentLevel+1}: ${LEVELS[currentLevel].name}`, W/2, H/2);
  ctx.shadowBlur=0;
  ctx.restore();
}

// ── Pause Screen ──
function drawPauseScreen() {
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.textAlign='center';
  ctx.fillStyle='#fff'; ctx.font='bold 56px Arial';
  ctx.shadowColor='#000'; ctx.shadowBlur=10;
  ctx.fillText('⏸ מושהה', W/2, 220);
  ctx.shadowBlur=0;
  ctx.fillStyle='#aaa'; ctx.font='24px Arial';
  ctx.fillText('לחץ ESC להמשך', W/2, 280);
  ctx.restore();
}

// ── Background ──────────────────────────────────────
function drawBG() {
  const lvl=LEVELS[currentLevel];
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,lvl.bgTop); g.addColorStop(1,lvl.bgBot);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  if (currentLevel===0) {
    ctx.save();
    ctx.shadowColor='rgba(255,240,80,0.7)';
    ctx.shadowBlur=40;
    ctx.fillStyle='#FFE830';
    ctx.beginPath();
    ctx.arc(720, 70, 48, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
    const treePositions=[60,160,680,740];
    for (const tx of treePositions) {
      ctx.save();
      ctx.fillStyle='#1a3a10';
      ctx.fillRect(tx-5, 390, 10, 60);
      ctx.beginPath(); ctx.moveTo(tx-28,395); ctx.lineTo(tx,340); ctx.lineTo(tx+28,395); ctx.fill();
      ctx.beginPath(); ctx.moveTo(tx-22,370); ctx.lineTo(tx,318); ctx.lineTo(tx+22,370); ctx.fill();
      ctx.restore();
    }
  }

  if (lvl.stars) {
    for (let i=0;i<80;i++) {
      const sx=(i*137+23)%790+5,sy=(i*97+11)%390+5;
      const br=(Math.sin(animTick*0.03+i*0.7)+1)*0.5;
      const sz = i%5===0 ? 2+br*1.5 : i%3===0 ? 1.5+br : 1+br*0.5;
      ctx.globalAlpha=0.3+br*0.7; ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(sx, sy, sz/2, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    if (currentLevel===1) {
      ctx.save();
      ctx.fillStyle='#FFF5CC';
      ctx.shadowColor='rgba(255,240,150,0.5)';
      ctx.shadowBlur=18;
      ctx.beginPath(); ctx.arc(700, 65, 36, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle=lvl.bgTop;
      ctx.shadowBlur=0;
      ctx.beginPath(); ctx.arc(718, 55, 32, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    if (currentLevel===2) {
      const nebulae=[
        {x:180,y:160,r:120,color:'rgba(80,0,180,0.13)'},
        {x:600,y:200,r:100,color:'rgba(0,80,200,0.12)'},
        {x:400,y:300,r:90, color:'rgba(180,0,100,0.10)'},
        {x:100,y:300,r:80, color:'rgba(0,150,180,0.09)'},
      ];
      ctx.save();
      for (const n of nebulae) {
        ctx.shadowColor=n.color; ctx.shadowBlur=60;
        ctx.fillStyle=n.color;
        ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
      }
      ctx.shadowBlur=0; ctx.restore();
    }

  }

  // Level 5 – City Street: evening sky, moon + city silhouette
  if (currentLevel===4) {
    ctx.save();
    ctx.fillStyle='#E8F0FF'; ctx.shadowColor='rgba(200,220,255,0.5)'; ctx.shadowBlur=22;
    ctx.beginPath(); ctx.arc(680, 60, 32, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#4a6fa5'; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(694, 52, 28, 0, Math.PI*2); ctx.fill();
    const bldgs=[{x:0,w:60,h:120},{x:55,w:40,h:160},{x:90,w:50,h:100},{x:680,w:50,h:140},{x:725,w:40,h:110},{x:760,w:42,h:155}];
    ctx.fillStyle='rgba(20,30,55,0.75)';
    for (const b of bldgs) {
      ctx.fillRect(b.x, H-50-b.h, b.w, b.h+20);
      ctx.fillStyle='rgba(255,240,140,0.5)';
      for(let wy=H-50-b.h+8; wy<H-55; wy+=18)
        for(let wx=b.x+6; wx<b.x+b.w-10; wx+=12)
          if(Math.sin(wx*7+wy*3)>0) ctx.fillRect(wx,wy,6,8);
      ctx.fillStyle='rgba(20,30,55,0.75)';
    }
    ctx.restore();
  }

  // Level 6 – Dark Warehouse: flickering industrial lights
  if (currentLevel===5) {
    ctx.save();
    const flicker = Math.sin(animTick*0.7)*0.15+0.85;
    for(const lx of [200,500]) {
      const lg=ctx.createRadialGradient(lx,0,0,lx,0,160);
      lg.addColorStop(0,`rgba(255,240,180,${0.18*flicker})`);
      lg.addColorStop(1,'transparent');
      ctx.fillStyle=lg; ctx.fillRect(0,0,W,H);
      ctx.fillStyle=`rgba(255,240,180,${0.7*flicker})`;
      ctx.fillRect(lx-18,0,36,8);
      ctx.beginPath(); ctx.arc(lx,8,6,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=0.10;
    for(let s=0;s<W;s+=30) {
      ctx.fillStyle=s%60===0?'#FF4400':'#111';
      ctx.fillRect(s,0,15,H);
    }
    ctx.globalAlpha=1; ctx.restore();
  }

  // Level 7 – Dog Valley: blood moon, fog, animated paw prints
  if (currentLevel===6) {
    ctx.save();
    const moonPulse = Math.sin(animTick*0.03)*0.1+0.9;
    ctx.shadowColor='rgba(255,30,0,0.6)'; ctx.shadowBlur=50*moonPulse;
    ctx.fillStyle=`rgba(200,20,0,${0.85*moonPulse})`;
    ctx.beginPath(); ctx.arc(400, 65, 48, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(120,0,0,0.45)';
    ctx.beginPath(); ctx.arc(420, 52, 40, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    for(const n of [{x:150,y:200,r:110},{x:600,y:180,r:95},{x:350,y:320,r:80}]) {
      ctx.fillStyle='rgba(160,8,8,0.09)';
      ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
    }
    const fogG=ctx.createLinearGradient(0,380,0,H);
    fogG.addColorStop(0,'transparent'); fogG.addColorStop(1,'rgba(80,0,0,0.38)');
    ctx.fillStyle=fogG; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(180,0,0,0.20)';
    for(let p=0;p<6;p++) {
      const ppx=(p*157+animTick*0.3)%W, ppy=422+Math.sin(p)*8;
      ctx.beginPath(); ctx.ellipse(ppx,ppy,10,8,0,0,Math.PI*2); ctx.fill();
      for(let t=0;t<3;t++){ctx.beginPath();ctx.ellipse(ppx-8+t*8,ppy-11,4,3,0,0,Math.PI*2);ctx.fill();}
    }
    ctx.restore();
  }

  if (lvl.clouds) {
    ctx.fillStyle='rgba(255,255,255,0.85)';
    for (const c of lvl.clouds) drawCloud(c.x+Math.sin(animTick*0.005)*8,c.y,c.r);
  }
}
function drawCloud(x,y,r) {
  ctx.beginPath();
  ctx.arc(x,y,r*0.55,0,Math.PI*2);
  ctx.arc(x+r*0.4,y-r*0.1,r*0.38,0,Math.PI*2);
  ctx.arc(x-r*0.35,y+r*0.1,r*0.32,0,Math.PI*2);
  ctx.fill();
}

// ── Platforms ───────────────────────────────────────
function drawPlatforms() {
  const [dark,mid,light]=LEVELS[currentLevel].platColor;
  for (const p of levelPlats) {
    if (!p.active&&p.cd<=0) continue;
    const alpha=(!p.active&&p.cd>0)?Math.min(1,p.cd/30)*0.4:1;
    ctx.globalAlpha=alpha;

    let topColor=light, bodyColor=mid, baseColor=dark;
    if (p.t==='ice')    { topColor='#e0f4ff'; bodyColor='#a0d4f0'; baseColor='#60a4c0'; }
    if (p.t==='bouncy') { topColor='#80FF80'; bodyColor='#40CC40'; baseColor='#208020'; }
    if (p.t==='crumble'&&p.ct>0) {
      const r=Math.min(1,1-p.ct/55);
      topColor=`rgb(${Math.round(255*r+parseInt(light.slice(1,3),16)*(1-r))},${Math.round(parseInt(light.slice(3,5),16)*(1-r))},0)`;
      baseColor='#882200';
      ctx.translate(Math.sin(animTick*1.5)*Math.min(3,(55-p.ct)/10),0);
    }

    ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(p.x+4,p.y+4,p.w,p.h);
    ctx.fillStyle=baseColor; ctx.fillRect(p.x,p.y,p.w,p.h);
    ctx.fillStyle=topColor; ctx.fillRect(p.x,p.y,p.w,4);
    ctx.fillStyle=bodyColor; ctx.fillRect(p.x+2,p.y+4,p.w-4,p.h-4);
    ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.fillRect(p.x+2,p.y+1,p.w-4,3);

    if (p.t==='ice') {
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.fillRect(p.x+4,p.y+1,p.w*0.3,2);
      ctx.fillRect(p.x+p.w*0.6,p.y+2,p.w*0.2,2);
    }
    if (p.t==='bouncy') {
      const sq=Math.sin(animTick*0.2)*2;
      ctx.fillStyle='#CCFF88';
      for(let bx=p.x+8;bx<p.x+p.w-8;bx+=14) {
        ctx.fillRect(bx,p.y-sq,6,4);
      }
    }
    if (p.t==='moving') {
      ctx.fillStyle='rgba(255,220,100,0.3)';
      ctx.fillRect(p.x,p.y,p.w,p.h);
      ctx.fillStyle='rgba(255,200,0,0.8)'; ctx.font='10px Arial'; ctx.textAlign='center';
      ctx.fillText(p.mx>0?'→':'←', p.x+p.w/2, p.y+p.h-2);
    }
    if (p.t==='crumble'&&p.ct>0) ctx.setTransform(1,0,0,1,0,0);
    ctx.globalAlpha=1;
  }
  ctx.textAlign='left';
}

// ── Fish ────────────────────────────────────────────
function drawFish() {
  for (const f of levelFish) {
    if (f.collected) continue;
    drawPixelFish(f.x, f.y+Math.sin(f.bob)*6, f);
  }
}
function drawPixelFish(x,y,f) {
  const S=2;
  const px=(rx,ry,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x+rx*S,y+ry*S,w*S,h*S);};
  ctx.save(); ctx.shadowColor='#FF8C00';
  ctx.shadowBlur = 10 + Math.sin(animTick*0.1 + (f?f.bob:0))*6;
  px(0,3,3,2,'#FF6600'); px(0,7,3,2,'#FF6600'); px(1,5,2,2,'#FF7700');
  px(3,2,9,8,'#FF9500'); px(2,3,1,6,'#FF8C00'); px(12,3,2,6,'#FF8C00');
  px(13,7,2,2,'#FF6600'); px(4,7,6,2,'#FFCC88');
  px(11,3,3,3,'#000'); px(12,3,1,1,'#fff');
  px(5,1,4,2,'#FF7700'); px(5,4,2,2,'#FF7700'); px(8,5,2,2,'#FF7700');
  ctx.restore();
}

// ── Items ───────────────────────────────────────────
function drawItems() {
  for (const it of levelItems) {
    if (it.collected) continue;
    const iy=it.y+Math.sin(it.bob||0)*4;
    ctx.save(); ctx.shadowBlur=8;
    if (it.t==='coin')     { ctx.shadowColor='#FFD700'; drawCoin(it.x,iy); }
    if (it.t==='milk')     { ctx.shadowColor='#fff';    drawMilk(it.x,iy); }
    if (it.t==='coffee')   { ctx.shadowColor='#8B4513'; drawCoffee(it.x,iy); }
    if (it.t==='goldfish') { ctx.shadowColor='#FFD700'; drawGoldFish(it.x,iy); }
    ctx.restore();
  }
}
function drawCoin(x,y) {
  ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(x+10,y+10,10,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFA500'; ctx.font='bold 11px Arial'; ctx.textAlign='center';
  ctx.fillText('🪙',x+10,y+14); ctx.textAlign='left';
}
function drawMilk(x,y) {
  ctx.fillStyle='#fff'; ctx.fillRect(x+4,y+4,16,18);
  ctx.fillStyle='#ddd'; ctx.fillRect(x+6,y+2,12,4);
  ctx.fillStyle='#FF69B4'; ctx.font='11px Arial'; ctx.textAlign='center';
  ctx.fillText('🥛',x+10,y+18); ctx.textAlign='left';
}
function drawCoffee(x,y) {
  ctx.fillStyle='#8B4513'; ctx.fillRect(x+3,y+8,18,14);
  ctx.strokeStyle='#6B3410'; ctx.lineWidth=2; ctx.strokeRect(x+3,y+8,18,14);
  ctx.fillStyle='#FFF8DC'; ctx.fillRect(x+5,y+10,14,5);
  ctx.font='12px Arial'; ctx.textAlign='center'; ctx.fillText('☕',x+10,y+16); ctx.textAlign='left';
}
function drawGoldFish(x,y) {
  ctx.fillStyle='#FFD700'; ctx.shadowColor='#FFA500'; ctx.shadowBlur=15;
  const S=2, px=(rx,ry,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x+rx*S,y+ry*S,w*S,h*S);};
  px(0,3,3,2,'#FFB700'); px(3,2,9,8,'#FFD700'); px(11,3,3,3,'#000'); px(12,3,1,1,'#fff');
  px(5,1,4,2,'#FFA500');
}

// ── Enemies ─────────────────────────────────────────
function drawEnemies() {
  for (const e of levelEnemies) {
    if (e.dead) continue;
    if (e.t==='dog')    drawDog(e);
    if (e.t==='bigdog') drawBigDog(e);
    if (e.t==='bird')   drawBird(e);
    if (e.t==='ghost')  drawGhost(e);
  }
}
function drawDog(e) {
  const x=e.x, y=e.wy;
  const flip=e.dir<0;
  ctx.save();
  if (e.st>0) ctx.globalAlpha=0.6;
  ctx.translate(x+20, y+18);
  if (flip) ctx.scale(-1,1);

  ctx.fillStyle='#C8882A';
  ctx.fillRect(-18,-12,36,22);
  ctx.fillStyle='#C8882A';
  ctx.fillRect(10,-22,22,18);
  ctx.fillStyle='#B07820';
  ctx.fillRect(26,-16,8,10);
  ctx.fillStyle='#A06810';
  ctx.fillRect(12,-28,8,8);
  ctx.fillStyle=e.st>0?'#FF0000':'#000';
  ctx.fillRect(22,-18,5,5);
  ctx.fillStyle='#fff'; ctx.fillRect(23,-17,2,2);
  ctx.fillStyle='#000'; ctx.fillRect(31,-11,4,3);
  const walk=Math.sin(animTick*0.35)*6;
  ctx.fillStyle='#A06810';
  ctx.fillRect(-14,8,8,12+walk); ctx.fillRect(-2,8,8,12-walk);
  ctx.fillRect(12,8,8,12+walk);  ctx.fillRect(22,8,8,12-walk);
  ctx.strokeStyle='#C8882A'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-18,0);
  ctx.quadraticCurveTo(-30,-10,-26,-22+Math.sin(animTick*0.08)*8);
  ctx.stroke();

  if (e.st>0) {
    ctx.font='14px Arial';
    for(let i=0;i<3;i++) {
      const a=animTick*0.12+i*2.1;
      ctx.fillText('⭐',Math.cos(a)*20,Math.sin(a)*10-30);
    }
  }
  ctx.restore();
}
function drawBigDog(e) {
  const x = e.x, y = e.wy;
  const flip = e.dir < 0;
  const walk = Math.sin(animTick * (e.chasing ? 0.55 : 0.28)) * 10;
  const rage = e.chasing;

  ctx.save();
  ctx.translate(x + 44, y + 28);
  if (flip) ctx.scale(-1, 1);

  // Danger zone glow when chasing
  if (rage) {
    ctx.save();
    const gz = ctx.createRadialGradient(0, 0, 10, 0, 0, 90);
    gz.addColorStop(0, 'rgba(255,40,0,0.18)');
    gz.addColorStop(1, 'transparent');
    ctx.fillStyle = gz;
    ctx.beginPath(); ctx.arc(0, 0, 90, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, 32, 42, 9, 0, 0, Math.PI*2); ctx.fill();

  // --- BODY ---
  ctx.fillStyle = e.st > 0 ? '#888' : (rage ? '#3a1800' : '#4a2000');
  ctx.beginPath();
  ctx.ellipse(0, 4, 40, 26, 0, 0, Math.PI*2); ctx.fill();

  // Body fur stripes (dark)
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 3;
  for (let s = -1; s <= 1; s++) {
    ctx.beginPath();
    ctx.moveTo(s * 14, -16); ctx.lineTo(s * 18, 12); ctx.stroke();
  }

  // --- HEAD ---
  ctx.fillStyle = rage ? '#3a1800' : '#5a2a00';
  ctx.beginPath(); ctx.ellipse(34, -14, 24, 20, 0.2, 0, Math.PI*2); ctx.fill();

  // Snout
  ctx.fillStyle = '#6a3800';
  ctx.beginPath(); ctx.ellipse(50, -8, 14, 11, 0, 0, Math.PI*2); ctx.fill();

  // Nose
  ctx.fillStyle = '#1a0800';
  ctx.beginPath(); ctx.ellipse(60, -11, 7, 5, 0, 0, Math.PI*2); ctx.fill();

  // Drool (only when chasing)
  if (rage) {
    ctx.strokeStyle = 'rgba(150,220,255,0.8)'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    const droop = Math.sin(animTick * 0.12) * 4;
    ctx.beginPath(); ctx.moveTo(52, -2); ctx.quadraticCurveTo(54, 8 + droop, 50, 14 + droop); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(58, -2); ctx.quadraticCurveTo(61, 6 + droop, 58, 12 + droop); ctx.stroke();
  }

  // Teeth
  ctx.fillStyle = '#fffde0';
  ctx.fillRect(46, -4, 5, 7);
  ctx.fillRect(53, -4, 5, 7);

  // Eyes
  const eyeColor = e.st > 0 ? '#555' : (rage ? '#FF2200' : '#880000');
  ctx.fillStyle = eyeColor;
  ctx.beginPath(); ctx.ellipse(30, -22, 7, 8, -0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(44, -20, 7, 8, 0.2, 0, Math.PI*2); ctx.fill();
  // Eye pupils
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(31, -22, 3, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(45, -20, 3, 5, 0, 0, Math.PI*2); ctx.fill();
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(33, -24, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(47, -22, 2, 0, Math.PI*2); ctx.fill();

  // Floppy ears
  ctx.fillStyle = '#3a1800';
  ctx.beginPath();
  ctx.moveTo(20, -30); ctx.quadraticCurveTo(10, -44, 22, -34);
  ctx.moveTo(38, -32); ctx.quadraticCurveTo(50, -46, 40, -36);
  ctx.fillStyle = '#3a1800';
  ctx.beginPath(); ctx.ellipse(15, -34, 10, 16, -0.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(44, -33, 10, 15, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5a2a00';
  ctx.beginPath(); ctx.ellipse(15, -33, 6, 11, -0.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(44, -32, 6, 10, 0.3, 0, Math.PI*2); ctx.fill();

  // --- LEGS (4 animated) ---
  const legColor = rage ? '#3a1800' : '#4a2000';
  ctx.fillStyle = legColor;
  // Front legs
  ctx.fillRect(16,  16, 14, 20 + walk);
  ctx.fillRect(30,  16, 14, 20 - walk);
  // Back legs
  ctx.fillRect(-18, 16, 14, 20 - walk);
  ctx.fillRect(-4,  16, 14, 20 + walk);
  // Paws
  ctx.fillStyle = '#6a3800';
  ctx.beginPath(); ctx.ellipse(23, 36 + walk,  9, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(37, 36 - walk,  9, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-11,36 - walk,  9, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(3,  36 + walk,  9, 6, 0, 0, Math.PI*2); ctx.fill();

  // Tail
  ctx.strokeStyle = legColor; ctx.lineWidth = 9; ctx.lineCap = 'round';
  const tailWag = Math.sin(animTick * (rage ? 0.5 : 0.12)) * (rage ? 22 : 12);
  ctx.beginPath();
  ctx.moveTo(-38, 0);
  ctx.quadraticCurveTo(-56, -8 + tailWag, -52, -26 + tailWag);
  ctx.stroke();

  // Stunned stars
  if (e.st > 0) {
    ctx.font = '18px Arial';
    for (let i = 0; i < 4; i++) {
      const a = animTick * 0.1 + i * 1.57;
      ctx.fillText('⭐', Math.cos(a)*30, Math.sin(a)*14 - 44);
    }
    // HP remaining
    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Arial'; ctx.textAlign = 'center';
    ctx.fillText(`💥 ${e.hp} HP`, 0, -58);
    ctx.textAlign = 'left';
  }

  // HP bar when damaged
  if (e.hp < e.maxHp) {
    const bw = 80, bh = 8;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(-bw/2, -70, bw, bh);
    ctx.fillStyle = e.hp > e.maxHp*0.5 ? '#44ff44' : '#ff4444';
    ctx.fillRect(-bw/2, -70, bw * (e.hp/e.maxHp), bh);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.strokeRect(-bw/2, -70, bw, bh);
  }

  // CHASE label
  if (rage) {
    ctx.save();
    ctx.fillStyle = 'rgba(255,30,0,0.9)';
    ctx.font = "bold 13px 'Fredoka One',Arial";
    ctx.textAlign = 'center';
    const labelBob = Math.sin(animTick * 0.15) * 3;
    ctx.fillText('⚠️ גְּרְר...', 0, -82 + labelBob);
    ctx.restore();
  }

  ctx.restore();
}

function drawBird(e) {
  const x=e.x, y=e.ry||e.y;
  const flap=Math.sin(animTick*0.4)*12;
  ctx.save();
  ctx.translate(x+14,y+10);
  ctx.fillStyle='#4488FF';
  ctx.beginPath(); ctx.ellipse(0,0,12,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2266DD';
  ctx.beginPath(); ctx.ellipse(-8,flap>0?-4:4,10,5,flap>0?-0.4:0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8,flap>0?-4:4,10,5,flap>0?0.4:-0.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4488FF'; ctx.beginPath(); ctx.arc(10,-4,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FF8C00'; ctx.beginPath();
  ctx.moveTo(16,-4); ctx.lineTo(22,-2); ctx.lineTo(16,-1); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(13,-6,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(14,-7,1,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Boss ─────────────────────────────────────────────
function drawBoss() {
  if (!boss) return;
  if (boss.isFinal) { drawFinalBoss(); return; }

  const x=boss.x, y=boss.y;
  const hit=boss.hitTimer>0;
  const rage=boss.rageMode;

  ctx.save();
  if (hit) ctx.globalAlpha=0.5+Math.sin(animTick*0.5)*0.5;
  if (rage) { ctx.shadowColor='#FF0000'; ctx.shadowBlur=20; }

  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(x+boss.w/2,y+boss.h+4,boss.w*0.5,8,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle=hit?'#FF6666':rage?'#AA4422':'#C8882A';
  ctx.fillRect(x,y+10,boss.w,boss.h-10);
  ctx.fillRect(x+boss.w*0.4,y-15,boss.w*0.7,40);
  ctx.fillStyle='#A06810';
  ctx.fillRect(x+boss.w*0.4,y-30,15,18); ctx.fillRect(x+boss.w*0.7,y-30,15,18);
  ctx.fillStyle=rage?'#FF0000':'#000';
  ctx.fillRect(x+boss.w*0.5+2,y-8,12,12); ctx.fillRect(x+boss.w*0.7,y-8,12,12);
  ctx.fillStyle='#fff'; ctx.fillRect(x+boss.w*0.5+4,y-6,5,5); ctx.fillRect(x+boss.w*0.7+2,y-6,5,5);
  ctx.fillStyle='#B07820'; ctx.fillRect(x+boss.w*0.85,y-2,20,18);
  ctx.fillStyle='#000'; ctx.fillRect(x+boss.w*0.88,y+2,12,7);
  ctx.fillStyle='#fff';
  for(let i=0;i<3;i++) ctx.fillRect(x+boss.w*0.88+i*4,y+8,3,5);
  const walk=Math.sin(animTick*0.2)*8;
  ctx.fillStyle='#A06810';
  ctx.fillRect(x+4,y+boss.h-10,18,18+walk); ctx.fillRect(x+24,y+boss.h-10,18,18-walk);
  ctx.fillRect(x+boss.w-42,y+boss.h-10,18,18-walk); ctx.fillRect(x+boss.w-22,y+boss.h-10,18,18+walk);
  ctx.strokeStyle='#C8882A'; ctx.lineWidth=8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x,y+boss.h/2);
  const ta=player.tailAngle*2;
  ctx.quadraticCurveTo(x-30,y+boss.h/3, x-45+Math.sin(ta)*20, y+boss.h/3-30+Math.cos(ta)*15);
  ctx.stroke();
  ctx.restore();

  drawBossHPBar(x+boss.w/2, y-45, boss.hp, boss.maxHp, rage);
}

function drawFinalBoss() {
  const b = boss;
  const x = b.x, y = b.y;
  const hit = b.hitTimer > 0;
  const rage = b.rageMode;
  const walk = Math.sin(animTick * (rage ? 0.45 : 0.22)) * 12;
  const S = 1.35; // scale multiplier vs regular bigdog

  ctx.save();
  if (hit) ctx.globalAlpha = 0.45 + Math.sin(animTick * 0.6) * 0.45;

  // Infernal aura
  if (rage) {
    ctx.save();
    const aura = ctx.createRadialGradient(x+b.w/2, y+b.h/2, 20, x+b.w/2, y+b.h/2, 130);
    aura.addColorStop(0, 'rgba(255,40,0,0.25)');
    aura.addColorStop(1, 'transparent');
    ctx.fillStyle = aura; ctx.beginPath(); ctx.arc(x+b.w/2, y+b.h/2, 130, 0, Math.PI*2); ctx.fill();
    ctx.shadowColor = '#FF2200'; ctx.shadowBlur = 28;
    ctx.restore();
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(x+b.w/2, y+b.h+6, b.w*0.52, 12, 0, 0, Math.PI*2); ctx.fill();

  // Body
  const bodyColor = hit ? '#994422' : rage ? '#2a0d00' : '#3a1500';
  ctx.fillStyle = bodyColor;
  ctx.beginPath(); ctx.ellipse(x+b.w/2, y+b.h*0.55, b.w*0.52, b.h*0.38, 0, 0, Math.PI*2); ctx.fill();

  // Fur ridges on back (intimidating)
  ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 4;
  for (let r = -2; r <= 2; r++) {
    ctx.beginPath(); ctx.moveTo(x+b.w/2+r*14, y+b.h*0.18);
    ctx.lineTo(x+b.w/2+r*18, y+b.h*0.52); ctx.stroke();
  }

  // Head
  ctx.fillStyle = rage ? '#2a0d00' : '#4a1a00';
  ctx.beginPath(); ctx.ellipse(x+b.w*0.72, y+b.h*0.22, b.w*0.34, b.h*0.3, 0.15, 0, Math.PI*2); ctx.fill();

  // Snout
  ctx.fillStyle = '#5a2500';
  ctx.beginPath(); ctx.ellipse(x+b.w*0.95, y+b.h*0.28, b.w*0.19, b.h*0.17, 0, 0, Math.PI*2); ctx.fill();

  // Nose
  ctx.fillStyle = '#0d0500';
  ctx.beginPath(); ctx.ellipse(x+b.w*1.06, y+b.h*0.22, 10, 7, 0, 0, Math.PI*2); ctx.fill();

  // Eyes — glowing red
  const eyeColor = rage ? '#FF0000' : '#CC2200';
  ctx.fillStyle = eyeColor; ctx.shadowColor = eyeColor; ctx.shadowBlur = rage ? 14 : 6;
  ctx.beginPath(); ctx.ellipse(x+b.w*0.63, y+b.h*0.12, 9, 11, -0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+b.w*0.78, y+b.h*0.11, 9, 11,  0.2, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(x+b.w*0.63, y+b.h*0.12, 4, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+b.w*0.78, y+b.h*0.11, 4, 7, 0, 0, Math.PI*2); ctx.fill();

  // Ears
  ctx.fillStyle = '#2a0d00';
  ctx.beginPath(); ctx.ellipse(x+b.w*0.56, y+b.h*0.0,  13, 20, -0.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+b.w*0.78, y-b.h*0.01, 13, 19,  0.4, 0, Math.PI*2); ctx.fill();

  // Drool (always for final boss)
  ctx.strokeStyle = 'rgba(180,240,255,0.85)'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  const droop = Math.sin(animTick * 0.13) * 5;
  ctx.beginPath(); ctx.moveTo(x+b.w*0.88, y+b.h*0.36);
  ctx.quadraticCurveTo(x+b.w*0.90, y+b.h*0.52+droop, x+b.w*0.86, y+b.h*0.60+droop); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+b.w*0.97, y+b.h*0.34);
  ctx.quadraticCurveTo(x+b.w*1.00, y+b.h*0.50+droop, x+b.w*0.96, y+b.h*0.58+droop); ctx.stroke();

  // Teeth
  ctx.fillStyle = '#ffffe0';
  ctx.fillRect(x+b.w*0.87, y+b.h*0.32, 7, 10);
  ctx.fillRect(x+b.w*0.95, y+b.h*0.32, 7, 10);

  // Legs
  const lc = rage ? '#2a0d00' : '#3a1500';
  ctx.fillStyle = lc;
  ctx.fillRect(x+b.w*0.08, y+b.h*0.68, 20, 28+walk);
  ctx.fillRect(x+b.w*0.22, y+b.h*0.68, 20, 28-walk);
  ctx.fillRect(x+b.w*0.60, y+b.h*0.68, 20, 28-walk);
  ctx.fillRect(x+b.w*0.74, y+b.h*0.68, 20, 28+walk);
  // Paws
  ctx.fillStyle = '#5a2500';
  ctx.beginPath(); ctx.ellipse(x+b.w*0.13, y+b.h+walk*0.5,  13, 8, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+b.w*0.27, y+b.h-walk*0.5, 13, 8, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+b.w*0.65, y+b.h-walk*0.5, 13, 8, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+b.w*0.79, y+b.h+walk*0.5,  13, 8, 0, 0, Math.PI*2); ctx.fill();

  // Tail
  ctx.strokeStyle = lc; ctx.lineWidth = 12; ctx.lineCap = 'round';
  const tw = Math.sin(animTick * (rage ? 0.55 : 0.14)) * (rage ? 30 : 18);
  ctx.beginPath();
  ctx.moveTo(x, y+b.h*0.5);
  ctx.quadraticCurveTo(x-40, y+b.h*0.3+tw, x-58, y+b.h*0.1+tw);
  ctx.stroke();

  // RAGE text
  if (rage) {
    ctx.save(); ctx.textAlign = 'center';
    ctx.fillStyle = '#FF2200';
    ctx.font = "bold 18px 'Fredoka One',Arial";
    ctx.shadowColor = '#FF0000'; ctx.shadowBlur = 12;
    const rbob = Math.sin(animTick * 0.18) * 4;
    ctx.fillText('💀 RAGE MODE 💀', x+b.w/2, y - 22 + rbob);
    ctx.shadowBlur = 0; ctx.restore();
  }

  ctx.restore();
  drawBossHPBar(x+b.w/2, y - 48, b.hp, b.maxHp, rage, true);
}

function drawBossHPBar(cx, by, hp, maxHp, rage, big=false) {
  const bw = big ? 130 : 100, bh = big ? 16 : 12;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.beginPath(); ctx.roundRect(cx-bw/2, by, bw, bh, 4); ctx.fill();
  const pct = hp / maxHp;
  const barColor = pct > 0.6 ? '#44ff44' : pct > 0.3 ? '#ffaa00' : '#ff2200';
  ctx.fillStyle = barColor;
  ctx.beginPath(); ctx.roundRect(cx-bw/2+1, by+1, (bw-2)*pct, bh-2, 3); ctx.fill();
  ctx.strokeStyle = rage ? '#FF4400' : '#ffffff'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(cx-bw/2, by, bw, bh, 4); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = `bold ${big?11:9}px Arial`; ctx.textAlign = 'center';
  ctx.fillText(`${hp}/${maxHp} HP`, cx, by + bh - 2);
  ctx.textAlign = 'left';
}

// ── Dash Trail ──────────────────────────────────────
function drawDashTrail() {
  const sprite = (runReady&&catRun)?catRun:(imgReady&&catImg)?catImg:null;
  if (!sprite) return;
  for (const t of dashTrail) {
    ctx.save();
    ctx.globalAlpha = t.alpha * 0.7;
    ctx.globalCompositeOperation = 'screen';
    // Orange tint overlay
    ctx.drawImage(sprite, t.x, t.y, PW, PH);
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(255,140,0,0.3)';
    ctx.fillRect(t.x, t.y, PW, PH);
    ctx.restore();
  }
}

// ── Player ──────────────────────────────────────────
function drawPlayer() {
  if (player.invincible>0&&Math.floor(player.invincible)%6<3) { return; }

  ctx.save();
  ctx.translate(player.x+PW/2, player.y+PH/2);
  if (player.facing===-1) ctx.scale(-1,1);

  let bobY=0,scaleX=1,scaleY=1,rot=0;

  // Landing squish
  if (player.landTimer>0) {
    const t=player.landTimer/12;
    scaleX=1+0.15*t;
    scaleY=1-0.15*t;
  } else if (player.state==='idle') {
    bobY=Math.sin(animTick*0.04)*2.5;
  } else if (player.state==='run') {
    bobY=Math.sin(animTick*0.35)*4;
    scaleX=1+Math.cos(animTick*0.35)*0.06;
    scaleY=1-Math.cos(animTick*0.35)*0.04;
  } else if (player.state==='jump') {
    rot=-0.18; bobY=-5; scaleY=1.08; scaleX=0.92;
  }

  if (player.coffeeTimer>0&&player.state==='run'&&Math.random()<0.3) {
    spawnP(player.x+PW/2,player.y+PH/2,'#8B4513',2,2);
  }

  ctx.save();
  ctx.translate(0,bobY); ctx.rotate(rot); ctx.scale(scaleX,scaleY);

  ctx.globalAlpha=0.18; ctx.fillStyle='#000';
  ctx.beginPath();
  const shadowScale=player.onGround?1:Math.max(0.3,1-player.vy*0.03);
  ctx.ellipse(0, PH/2+6, PW*0.4*shadowScale, 6*shadowScale, 0,0,Math.PI*2);
  ctx.fill(); ctx.globalAlpha=1;

  // Warm glow behind cat
  ctx.save();
  const catGlowR = ctx.createRadialGradient(0, 0, 2, 0, 0, PW*0.75);
  catGlowR.addColorStop(0, 'rgba(255,160,60,0.28)');
  catGlowR.addColorStop(1, 'transparent');
  ctx.fillStyle = catGlowR;
  ctx.beginPath(); ctx.ellipse(0, 0, PW*0.75, PH*0.65, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  if (player.hurtFlash>0) ctx.globalAlpha=0.4+Math.sin(animTick*0.8)*0.4;

  const mainSprite = (runReady && catRun) ? catRun
                   : (imgReady && catImg) ? catImg : null;

  if (mainSprite) {
    ctx.save();
    ctx.shadowColor = 'rgba(255,140,40,0.4)';
    ctx.shadowBlur = 8;
    if (player.state==='run') {
      const lc=Math.sin(animTick*0.38);
      ctx.scale(1+lc*0.07, 1-lc*0.05);
      ctx.translate(player.facing*lc*2, 0);
    }
    ctx.drawImage(mainSprite, -PW/2, -PH/2, PW, PH);
    ctx.shadowBlur = 0;
    ctx.restore();
  } else {
    drawFallbackCat();
  }
  ctx.globalAlpha=1;

  drawRunningPaws();
  drawAnimatedTail();

  if (player.coffeeTimer>0) {
    ctx.strokeStyle='rgba(255,150,0,0.5)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0,PW*0.6,0,Math.PI*2); ctx.stroke();
  }

  ctx.restore();

  if (player.meowActive>0) {
    const alpha=Math.min(1,player.meowActive/15);
    ctx.globalAlpha=alpha;
    const bw=80,bh=32,bx=10,by=-PH/2-50;
    ctx.fillStyle='#fff'; ctx.strokeStyle='#555'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,8); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+10,by+bh); ctx.lineTo(bx+2,by+bh+12); ctx.lineTo(bx+22,by+bh); ctx.fill();
    ctx.fillStyle='#333'; ctx.font='bold 15px Arial'; ctx.textAlign='center';
    const meows=['מיאו!','מי-אאוו!','מיאו~','פורר...'];
    ctx.fillText(meows[Math.floor(animTick*0.003+currentLevel)%meows.length],bx+bw/2,by+bh/2+5);
    ctx.textAlign='left'; ctx.globalAlpha=1;
  }

  if (player.sweat) {
    ctx.fillStyle='#88CCFF'; ctx.globalAlpha=0.8;
    const sw=Math.sin(animTick*0.15);
    ctx.beginPath(); ctx.arc(PW*0.35,-PH*0.1+sw*3,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(PW*0.2,-PH*0.25+sw*4,3,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  if (player.heartAnim>0) {
    ctx.globalAlpha=player.heartAnim/30;
    ctx.fillStyle='#FF4466'; ctx.font='20px Arial'; ctx.textAlign='center';
    ctx.fillText('💖',0,-PH/2-20-(30-player.heartAnim)*0.5);
    ctx.textAlign='left'; ctx.globalAlpha=1;
  }

  if (player.idleTimer>200) {
    const zz=Math.sin(animTick*0.06)*5;
    ctx.fillStyle='#aaa'; ctx.font=`bold ${12+Math.sin(animTick*0.04)*2}px Arial`;
    ctx.textAlign='center'; ctx.fillText('z',PW*0.4,-PH/2-15+zz);
    if (player.idleTimer>280) ctx.fillText('Z',PW*0.5,-PH/2-28+zz);
    if (player.idleTimer>360) ctx.fillText('Z',PW*0.6,-PH/2-42+zz);
    ctx.textAlign='left';
  }

  ctx.restore();
}

// ── Ginger running paw animation (drawn over/under the photo) ──
function drawRunningPaws() {
  if (player.state !== 'run' && player.state !== 'jump') return;

  const spd = player.coffeeTimer > 0 ? 0.7 : 0.44;
  const t = animTick * spd;

  // Gallop cycle: front pair and back pair alternate (0°–180° out of phase)
  const frontPhase = t;
  const backPhase  = t + Math.PI;

  // Colors matching ginger cat
  const pawColor   = '#D2691E';
  const padColor   = '#FF9090';
  const clawColor  = 'rgba(255,200,150,0.7)';

  ctx.save();

  function drawPaw(px, py, phase, scale=1) {
    const lift = Math.max(0, Math.sin(phase)) * 18 * scale;
    const ext  = Math.cos(phase) * 8 * scale;
    ctx.save();
    ctx.translate(px + ext, py - lift);
    // Leg stub
    ctx.fillStyle = pawColor;
    ctx.beginPath();
    ctx.ellipse(0, 0, 6*scale, 8*scale, 0, 0, Math.PI*2);
    ctx.fill();
    // Paw pad
    ctx.fillStyle = padColor;
    ctx.beginPath();
    ctx.ellipse(0, 5*scale, 5*scale, 4*scale, 0, 0, Math.PI*2);
    ctx.fill();
    // Claws
    ctx.strokeStyle = clawColor; ctx.lineWidth = 1;
    for (let c = -1; c <= 1; c++) {
      ctx.beginPath();
      ctx.moveTo(c * 3 * scale, 7*scale);
      ctx.lineTo(c * 4 * scale, 11*scale);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Front left paw
  drawPaw(-PW*0.28, PH*0.38, frontPhase, 0.85);
  // Front right paw
  drawPaw(-PW*0.08, PH*0.38, frontPhase + Math.PI, 0.85);
  // Back left paw
  drawPaw(PW*0.08, PH*0.42, backPhase, 0.9);
  // Back right paw
  drawPaw(PW*0.28, PH*0.42, backPhase + Math.PI, 0.9);

  // Dust puffs when on ground and running
  if (player.onGround && Math.sin(t) > 0.7 && Math.random() < 0.4) {
    const dustX = player.x + PW/2 + (Math.random()-0.5)*PW*0.5;
    const dustY = player.y + PH;
    spawnP(dustX, dustY, 'rgba(200,180,140,0.5)', 2, 3);
  }

  ctx.restore();
}

function drawAnimatedTail() {
  const a=player.tailAngle;
  const bx=13, by=2;
  const grad=ctx.createLinearGradient(bx,by,bx+22,by-38);
  grad.addColorStop(0,'#C8722A');
  grad.addColorStop(1,'#E8A050');
  ctx.strokeStyle=grad;
  ctx.lineWidth=7; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath();
  ctx.moveTo(bx,by);
  ctx.quadraticCurveTo(
    bx+14+Math.sin(a)*10,  by-16+Math.cos(a)*6,
    bx+18+Math.sin(a)*18,  by-32+Math.cos(a*1.2)*12
  );
  ctx.stroke();
  ctx.lineWidth=4;
  ctx.strokeStyle='#E8B070';
  const tipX=bx+18+Math.sin(a)*18, tipY=by-32+Math.cos(a*1.2)*12;
  ctx.beginPath();
  ctx.moveTo(tipX,tipY);
  ctx.quadraticCurveTo(
    tipX+5+Math.sin(a*0.9)*7, tipY-9,
    tipX+3+Math.sin(a*1.4)*10, tipY-18
  );
  ctx.stroke();
}

function drawTail() { drawAnimatedTail(); }
function drawFallbackCat() {
  // Body
  ctx.fillStyle='#D2691E';
  ctx.beginPath(); ctx.ellipse(0, 4, PW*0.46, PH*0.42, 0, 0, Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle='#E07828';
  ctx.beginPath(); ctx.ellipse(0, -PH*0.28, PW*0.38, PH*0.3, 0, 0, Math.PI*2); ctx.fill();
  // Ears
  ctx.fillStyle='#C86020';
  ctx.beginPath(); ctx.moveTo(-PW*0.32,-PH*0.48); ctx.lineTo(-PW*0.18,-PH*0.22); ctx.lineTo(-PW*0.08,-PH*0.52); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(PW*0.32,-PH*0.48); ctx.lineTo(PW*0.18,-PH*0.22); ctx.lineTo(PW*0.08,-PH*0.52); ctx.closePath(); ctx.fill();
  // Inner ears
  ctx.fillStyle='#FF9090';
  ctx.beginPath(); ctx.moveTo(-PW*0.26,-PH*0.44); ctx.lineTo(-PW*0.18,-PH*0.26); ctx.lineTo(-PW*0.12,-PH*0.46); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(PW*0.26,-PH*0.44); ctx.lineTo(PW*0.18,-PH*0.26); ctx.lineTo(PW*0.12,-PH*0.46); ctx.closePath(); ctx.fill();
  // Forehead stripes
  ctx.strokeStyle='#A04010'; ctx.lineWidth=1.5;
  for(let s=-1;s<=1;s++){ctx.beginPath();ctx.moveTo(s*9,-PH*0.5);ctx.lineTo(s*7,-PH*0.3);ctx.stroke();}
  // Eyes
  ctx.fillStyle='#2a1a00';
  ctx.beginPath(); ctx.ellipse(-PW*0.13,-PH*0.28,5,6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(PW*0.13,-PH*0.28,5,6,0,0,Math.PI*2); ctx.fill();
  // Eye shine
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-PW*0.11,-PH*0.31,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(PW*0.15,-PH*0.31,2,0,Math.PI*2); ctx.fill();
  // Nose
  ctx.fillStyle='#FF8090';
  ctx.beginPath(); ctx.moveTo(-4,-PH*0.14); ctx.lineTo(4,-PH*0.14); ctx.lineTo(0,-PH*0.08); ctx.closePath(); ctx.fill();
  // Whiskers
  ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=1;
  [[-1,1],[-.7,0],[-.9,-0.8]].forEach(([sx,sy])=>{ctx.beginPath();ctx.moveTo(-5,-PH*0.12);ctx.lineTo(-5+sx*20,-PH*0.12+sy*4);ctx.stroke();});
  [[1,1],[.7,0],[.9,-0.8]].forEach(([sx,sy])=>{ctx.beginPath();ctx.moveTo(5,-PH*0.12);ctx.lineTo(5+sx*20,-PH*0.12+sy*4);ctx.stroke();});
}

// ── Fell animation ───────────────────────────────────
function drawFellAnim() {
  const prog=1-stateTimer/110;
  const sy=Math.min(H+40,H-60+prog*180);

  if (prog>0.15) {
    const xAlpha=Math.min(1,(prog-0.15)/0.25)*0.88;
    ctx.save();
    ctx.globalAlpha=xAlpha;
    ctx.strokeStyle='#FF0000'; ctx.lineWidth=22; ctx.lineCap='round';
    ctx.shadowColor='#FF0000'; ctx.shadowBlur=25;
    const shk=Math.sin(animTick*1.4)*(1-prog)*6;
    ctx.beginPath(); ctx.moveTo(240+shk,145); ctx.lineTo(560-shk,385); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(560+shk,145); ctx.lineTo(240-shk,385); ctx.stroke();
    ctx.restore();
  }

  ctx.save();
  ctx.translate(player.x+PW/2,sy);
  ctx.rotate(player.spinAngle);
  ctx.scale(1-prog*0.3,1-prog*0.3);
  ctx.globalAlpha=Math.max(0,1-prog*1.3);
  const fellSprite = (runReady&&catRun)?catRun:(imgReady&&catImg)?catImg:null;
  if (fellSprite) ctx.drawImage(fellSprite,-PW/2,-PH/2,PW,PH);
  ctx.globalAlpha=1;
  for (let i=0;i<5;i++) {
    const a=player.spinAngle*2+i*(Math.PI*2/5);
    ctx.save(); ctx.translate(Math.cos(a)*38,Math.sin(a)*22); ctx.rotate(a);
    ctx.fillStyle='#FFD700'; ctx.font='16px Arial'; ctx.textAlign='center'; ctx.fillText('⭐',0,0);
    ctx.restore();
  }
  ctx.restore();
}

function drawParticlesAll() {
  for (const p of particles) {
    ctx.globalAlpha=Math.max(0,p.life/(p.maxLife||40));
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size/2, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawFloats() {
  ctx.textAlign='center';
  for (const t of floatTexts) {
    ctx.globalAlpha=Math.min(1,t.timer/20);
    ctx.fillStyle=t.color; ctx.font='bold 15px Arial';
    ctx.fillText(t.text,t.x,t.y);
  }
  ctx.globalAlpha=1; ctx.textAlign='left';
}

// ── HUD ──────────────────────────────────────────────
function drawHUD() {
  // HUD background — frosted dark bar
  const hudG = ctx.createLinearGradient(0,0,0,50);
  hudG.addColorStop(0,'rgba(5,3,18,0.88)');
  hudG.addColorStop(1,'rgba(10,6,25,0.65)');
  ctx.fillStyle=hudG;
  ctx.fillRect(0,0,W,50);
  // Bottom glow line
  const lineG = ctx.createLinearGradient(0,0,W,0);
  lineG.addColorStop(0,'transparent');
  lineG.addColorStop(0.2,'rgba(255,150,40,0.55)');
  lineG.addColorStop(0.8,'rgba(255,150,40,0.55)');
  lineG.addColorStop(1,'transparent');
  ctx.fillStyle=lineG; ctx.fillRect(0,49,W,1.5);

  // Cat face portrait in HUD
  const portrait = (imgReady&&catImg)?catImg:(runReady&&catRun)?catRun:null;
  if (portrait) {
    ctx.save();
    ctx.beginPath(); ctx.arc(26,25,19,0,Math.PI*2); ctx.clip();
    ctx.drawImage(portrait,7,6,38,38);
    ctx.restore();
    ctx.strokeStyle='rgba(255,160,50,0.8)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(26,25,19,0,Math.PI*2); ctx.stroke();
  }

  // Lives
  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font="bold 12px 'Heebo',Arial";
  ctx.fillText('❤',portrait?52:10, 20);
  for (let i=0;i<3;i++) drawPixelHeart((portrait?66:24)+i*36, 8, i<lives);
